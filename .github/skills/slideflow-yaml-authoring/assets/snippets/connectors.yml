# Connector snippets
csv:
  type: "csv"
  name: "sales_csv"
  file_path: "./data/sales.csv"

json:
  type: "json"
  name: "events_json"
  file_path: "./data/events.json"
  orient: "records"

databricks_sql:
  type: "databricks"
  name: "warehouse_query"
  query: "SELECT * FROM mart.sales LIMIT 100"

redshift_sql:
  type: "redshift"
  name: "redshift_query"
  host: "example-cluster.abc123.us-east-1.redshift.amazonaws.com"
  database: "analytics"
  user: "reporting_user"
  query: "SELECT * FROM mart.sales LIMIT 100"

dbt_preferred:
  type: "dbt"
  name: "dbt_model"
  model_alias: "slide__revenue_model"
  dbt:
    package_url: "https://$DBT_GIT_TOKEN@github.com/org/dbt-project.git"
    project_dir: "/tmp/dbt_project"
    branch: "main"
    target: "prod"
    vars:
      time_period: "weekly"
  warehouse:
    type: "databricks"

dbt_redshift:
  type: "dbt"
  name: "dbt_model_redshift"
  model_alias: "slide__revenue_model"
  dbt:
    package_url: "https://$DBT_GIT_TOKEN@github.com/org/dbt-project.git"
    project_dir: "/tmp/dbt_project"
    branch: "main"
    target: "prod"
  warehouse:
    type: "redshift"
    host: "example-cluster.abc123.us-east-1.redshift.amazonaws.com"
    database: "analytics"
    user: "reporting_user"

databricks_dbt_legacy:
  type: "databricks_dbt"
  name: "dbt_model_legacy"
  model_alias: "slide__revenue_model"
  package_url: "https://$DBT_GIT_TOKEN@github.com/org/dbt-project.git"
  project_dir: "/tmp/dbt_project"
  branch: "main"
  target: "prod"
