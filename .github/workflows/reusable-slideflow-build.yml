name: Reusable Slideflow Build

on:
  workflow_call:
    inputs:
      artifact-kind:
        description: "Artifact type to build: presentation or sheets"
        required: false
        default: "presentation"
        type: string
      config-file:
        description: "Path to Slideflow YAML config"
        required: true
        type: string
      registry-files:
        description: "Optional comma/newline-separated registry file paths"
        required: false
        default: ""
        type: string
      params-path:
        description: "Optional CSV params file path"
        required: false
        default: ""
        type: string
      working-directory:
        description: "Working directory for commands"
        required: false
        default: "."
        type: string
      python-version:
        description: "Python version"
        required: false
        default: "3.12"
        type: string
      slideflow-package-spec:
        description: "Package spec to install (e.g. slideflow-presentations==0.0.2)"
        required: false
        default: "slideflow-presentations"
        type: string
      slideflow-install-extras:
        description: "Optional comma-separated extras to install with slideflow-package-spec"
        required: false
        default: "dbt,databricks,bigquery,duckdb"
        type: string
      extra-pip-packages:
        description: "Optional newline-separated pip packages"
        required: false
        default: ""
        type: string
      run-pip-check:
        description: "Run python -m pip check after install"
        required: false
        default: true
        type: boolean
      run-doctor:
        description: "Run slideflow doctor preflight checks before validate/build"
        required: false
        default: true
        type: boolean
      strict-doctor:
        description: "Fail fast when doctor detects error-severity issues"
        required: false
        default: false
        type: boolean
      run-validate:
        description: "Run slideflow validate before build"
        required: false
        default: true
        type: boolean
      run-provider-contract-check:
        description: "Run provider contract checks during validate (Google Slides/Docs)"
        required: false
        default: false
        type: boolean
      provider-contract-params-path:
        description: "Optional CSV for provider contract check template IDs; falls back to params-path when unset"
        required: false
        default: ""
        type: string
      dry-run:
        description: "Run build with --dry-run"
        required: false
        default: false
        type: boolean
      threads:
        description: "Optional --threads value (presentations + sheets)"
        required: false
        default: ""
        type: string
      requests-per-second:
        description: "Optional --rps value (presentations + sheets)"
        required: false
        default: ""
        type: string
      upload-log-artifact:
        description: "Upload build logs and discovered URLs as an artifact"
        required: false
        default: true
        type: boolean
      artifact-name:
        description: "Artifact name for logs/URLs"
        required: false
        default: "slideflow-build-logs"
        type: string
    secrets:
      GOOGLE_SLIDEFLOW_CREDENTIALS:
        description: "Optional Google credentials content/path for provider env fallback"
        required: false
      DATABRICKS_HOST:
        description: "Optional Databricks workspace host for connector env fallback"
        required: false
      DATABRICKS_HTTP_PATH:
        description: "Optional Databricks SQL warehouse HTTP path for env fallback"
        required: false
      DATABRICKS_ACCESS_TOKEN:
        description: "Optional Databricks access token for connector env fallback"
        required: false
      DBT_GIT_TOKEN:
        description: "Optional Git token for private databricks_dbt package_url clones"
        required: false
      DBT_ACCESS_TOKEN:
        description: "Optional DBT access token for dbt packages that require env_var('DBT_ACCESS_TOKEN')"
        required: false
      DBT_ENV_SECRET_GIT_CREDENTIAL:
        description: "Optional git credential for dbt deps private package clones"
        required: false
      BIGQUERY_PROJECT:
        description: "Optional BigQuery project id fallback for warehouse.type=bigquery"
        required: false
      GOOGLE_APPLICATION_CREDENTIALS_JSON:
        description: "Optional Google service-account JSON to write as ADC credentials file"
        required: false
    outputs:
      presentation-urls:
        description: "Comma-separated presentation URLs extracted from build JSON output"
        value: ${{ jobs.build.outputs.presentation_urls }}
      workbook-urls:
        description: "Comma-separated workbook URLs extracted from sheets build JSON output"
        value: ${{ jobs.build.outputs.workbook_urls }}
      artifact-urls:
        description: "Comma-separated artifact URLs extracted from build JSON output"
        value: ${{ jobs.build.outputs.artifact_urls }}
      doctor-result-json:
        description: "JSON output emitted by slideflow doctor"
        value: ${{ jobs.build.outputs.doctor_result_json }}
      validate-result-json:
        description: "JSON output emitted by slideflow validate"
        value: ${{ jobs.build.outputs.validate_result_json }}
      build-result-json:
        description: "JSON output emitted by slideflow build"
        value: ${{ jobs.build.outputs.build_result_json }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SLIDEFLOW_CREDENTIALS: ${{ secrets.GOOGLE_SLIDEFLOW_CREDENTIALS }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_ACCESS_TOKEN: ${{ secrets.DATABRICKS_ACCESS_TOKEN }}
      DBT_GIT_TOKEN: ${{ secrets.DBT_GIT_TOKEN }}
      DBT_ACCESS_TOKEN: ${{ secrets.DBT_ACCESS_TOKEN || secrets.DBT_GIT_TOKEN }}
      DBT_ENV_SECRET_GIT_CREDENTIAL: ${{ secrets.DBT_ENV_SECRET_GIT_CREDENTIAL || secrets.DBT_ACCESS_TOKEN || secrets.DBT_GIT_TOKEN }}
      BIGQUERY_PROJECT: ${{ secrets.BIGQUERY_PROJECT }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
    outputs:
      presentation_urls: ${{ steps.extract_urls.outputs.presentation_urls }}
      workbook_urls: ${{ steps.extract_urls.outputs.workbook_urls }}
      artifact_urls: ${{ steps.extract_urls.outputs.artifact_urls }}
      doctor_result_json: ${{ steps.extract_json.outputs.doctor_result_json }}
      validate_result_json: ${{ steps.extract_json.outputs.validate_result_json }}
      build_result_json: ${{ steps.extract_json.outputs.build_result_json }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install Slideflow
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          package_spec="${{ inputs.slideflow-package-spec }}"
          extras="${{ inputs.slideflow-install-extras }}"
          install_spec="$package_spec"

          if [[ -n "$extras" ]]; then
            if [[ "$package_spec" == *"["* ]]; then
              install_spec="$package_spec"
            elif [[ "$package_spec" == *" @ "* ]]; then
              package_name="${package_spec%% @ *}"
              package_source="${package_spec#* @ }"
              install_spec="${package_name}[${extras}] @ ${package_source}"
            elif [[ "$package_spec" == *"=="* ]]; then
              package_name="${package_spec%%==*}"
              package_version="${package_spec#*==}"
              install_spec="${package_name}[${extras}]==${package_version}"
            elif [[ "$package_spec" =~ ^(git\+|https?://|file://|/|\.{1,2}/) ]]; then
              echo "::warning::slideflow-install-extras was ignored for direct URL/path package spec '${package_spec}'. Use a named requirement (for example: slideflow-presentations[${extras}] @ <url>) if extras are required."
              install_spec="$package_spec"
            else
              install_spec="${package_spec}[${extras}]"
            fi
          fi

          python -m pip install "$install_spec"

          if [[ -n "${{ inputs.extra-pip-packages }}" ]]; then
            while IFS= read -r pkg; do
              pkg="$(echo "$pkg" | xargs)"
              if [[ -n "$pkg" ]]; then
                python -m pip install "$pkg"
              fi
            done <<< "${{ inputs.extra-pip-packages }}"
          fi

      - name: Validate environment
        if: ${{ inputs.run-pip-check }}
        run: |
          python -m pip check

      - name: Configure optional Google application credentials
        run: |
          set -euo pipefail
          if [[ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]]; then
            creds_file="${RUNNER_TEMP}/google-application-credentials.json"
            printf '%s' "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" > "$creds_file"
            echo "GOOGLE_APPLICATION_CREDENTIALS=$creds_file" >> "$GITHUB_ENV"
          fi

      - name: Validate and build
        id: run_build
        env:
          LOG_FILE: ${{ runner.temp }}/slideflow-build.log
          URL_FILE: ${{ runner.temp }}/slideflow-presentation-urls.txt
          DOCTOR_JSON_FILE: ${{ runner.temp }}/slideflow-doctor-result.json
          VALIDATE_JSON_FILE: ${{ runner.temp }}/slideflow-validate-result.json
          BUILD_JSON_FILE: ${{ runner.temp }}/slideflow-build-result.json
          ARTIFACT_KIND: ${{ inputs.artifact-kind }}
        run: |
          set -euo pipefail
          artifact_kind="${{ inputs.artifact-kind }}"
          if [[ "$artifact_kind" != "presentation" && "$artifact_kind" != "sheets" ]]; then
            echo "Unsupported artifact-kind: '$artifact_kind' (expected 'presentation' or 'sheets')" >&2
            exit 1
          fi
          : > "$LOG_FILE"
          : > "$URL_FILE"
          printf '{}\n' > "$DOCTOR_JSON_FILE"
          printf '{}\n' > "$VALIDATE_JSON_FILE"
          printf '{}\n' > "$BUILD_JSON_FILE"

          registry_args=()
          if [[ -n "${{ inputs.registry-files }}" ]]; then
            while IFS= read -r registry; do
              registry="$(echo "$registry" | xargs)"
              if [[ -n "$registry" ]]; then
                registry_args+=("--registry" "$registry")
              fi
            done < <(printf '%s\n' "${{ inputs.registry-files }}" | tr ',' '\n')
          fi

          if [[ "${{ inputs.run-doctor }}" == "true" ]]; then
            if [[ "$artifact_kind" == "sheets" ]]; then
              doctor_cmd=(slideflow sheets doctor "${{ inputs.config-file }}" --output-json "$DOCTOR_JSON_FILE")
            else
              doctor_cmd=(slideflow doctor --config-file "${{ inputs.config-file }}" --output-json "$DOCTOR_JSON_FILE")
            fi
            if [[ ${#registry_args[@]} -gt 0 ]]; then
              doctor_cmd+=("${registry_args[@]}")
            fi
            if [[ "${{ inputs.strict-doctor }}" == "true" ]]; then
              doctor_cmd+=("--strict")
            fi
            {
              echo "Running: ${doctor_cmd[*]}"
              "${doctor_cmd[@]}"
            } 2>&1 | tee -a "$LOG_FILE"
          fi

          if [[ "${{ inputs.run-validate }}" == "true" ]]; then
            if [[ "$artifact_kind" == "sheets" ]]; then
              validate_cmd=(slideflow sheets validate "${{ inputs.config-file }}" --output-json "$VALIDATE_JSON_FILE")
            else
              validate_cmd=(slideflow validate "${{ inputs.config-file }}" --output-json "$VALIDATE_JSON_FILE")
            fi
            if [[ ${#registry_args[@]} -gt 0 ]]; then
              validate_cmd+=("${registry_args[@]}")
            fi
            if [[ "$artifact_kind" == "presentation" && "${{ inputs.run-provider-contract-check }}" == "true" ]]; then
              validate_cmd+=("--provider-contract-check")
              contract_params_path="${{ inputs.provider-contract-params-path }}"
              if [[ -z "$contract_params_path" && -n "${{ inputs.params-path }}" ]]; then
                contract_params_path="${{ inputs.params-path }}"
              fi
              if [[ -n "$contract_params_path" ]]; then
                validate_cmd+=("--params-path" "$contract_params_path")
              fi
            fi
            {
              echo "Running: ${validate_cmd[*]}"
              "${validate_cmd[@]}"
            } 2>&1 | tee -a "$LOG_FILE"
          fi

          if [[ "$artifact_kind" == "sheets" ]]; then
            build_cmd=(slideflow sheets build "${{ inputs.config-file }}" --output-json "$BUILD_JSON_FILE")
          else
            build_cmd=(slideflow build "${{ inputs.config-file }}" --output-json "$BUILD_JSON_FILE")
          fi
          if [[ ${#registry_args[@]} -gt 0 ]]; then
            build_cmd+=("${registry_args[@]}")
          fi
          if [[ "$artifact_kind" == "presentation" && -n "${{ inputs.params-path }}" ]]; then
            build_cmd+=("--params-path" "${{ inputs.params-path }}")
          fi
          if [[ "$artifact_kind" == "presentation" && "${{ inputs.dry-run }}" == "true" ]]; then
            build_cmd+=("--dry-run")
          fi
          if [[ -n "${{ inputs.threads }}" ]]; then
            build_cmd+=("--threads" "${{ inputs.threads }}")
          fi
          if [[ -n "${{ inputs.requests-per-second }}" ]]; then
            build_cmd+=("--rps" "${{ inputs.requests-per-second }}")
          fi

          {
            echo "Running: ${build_cmd[*]}"
            "${build_cmd[@]}"
          } 2>&1 | tee -a "$LOG_FILE"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          build_json = Path(os.environ["BUILD_JSON_FILE"])
          url_file = Path(os.environ["URL_FILE"])
          artifact_kind = os.environ.get("ARTIFACT_KIND", "presentation")

          urls = []
          if build_json.exists():
              try:
                  payload = json.loads(build_json.read_text(encoding="utf-8"))
              except Exception:
                  payload = {}
              if artifact_kind == "sheets":
                  summary = payload.get("summary", {})
                  if isinstance(summary, dict):
                      workbook_url = summary.get("workbook_url")
                      if isinstance(workbook_url, str) and workbook_url:
                          urls.append(workbook_url)
              else:
                  for row in payload.get("results", []):
                      if isinstance(row, dict):
                          url = row.get("url")
                          if isinstance(url, str) and url:
                              urls.append(url)

          unique_urls = sorted(set(urls))
          text = "\n".join(unique_urls)
          if text:
              text += "\n"
          url_file.write_text(text, encoding="utf-8")
          PY

      - name: Extract URL output
        id: extract_urls
        if: ${{ always() }}
        env:
          URL_FILE: ${{ runner.temp }}/slideflow-presentation-urls.txt
        run: |
          set -euo pipefail
          if [[ -s "$URL_FILE" ]]; then
            extracted_urls="$(paste -sd, "$URL_FILE")"
          else
            extracted_urls=""
          fi
          if [[ "${{ inputs.artifact-kind }}" == "sheets" ]]; then
            echo "presentation_urls=" >> "$GITHUB_OUTPUT"
            echo "workbook_urls=$extracted_urls" >> "$GITHUB_OUTPUT"
            echo "artifact_urls=$extracted_urls" >> "$GITHUB_OUTPUT"
          else
            echo "presentation_urls=$extracted_urls" >> "$GITHUB_OUTPUT"
            echo "workbook_urls=" >> "$GITHUB_OUTPUT"
            echo "artifact_urls=$extracted_urls" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract JSON outputs
        id: extract_json
        if: ${{ always() }}
        env:
          DOCTOR_JSON_FILE: ${{ runner.temp }}/slideflow-doctor-result.json
          VALIDATE_JSON_FILE: ${{ runner.temp }}/slideflow-validate-result.json
          BUILD_JSON_FILE: ${{ runner.temp }}/slideflow-build-result.json
        run: |
          set -euo pipefail

          emit_json_output() {
            local key="$1"
            local file="$2"
            echo "${key}<<EOF" >> "$GITHUB_OUTPUT"
            if [[ -s "$file" ]]; then
              cat "$file" >> "$GITHUB_OUTPUT"
            else
              echo "{}" >> "$GITHUB_OUTPUT"
            fi
            echo "EOF" >> "$GITHUB_OUTPUT"
          }

          emit_json_output "doctor_result_json" "$DOCTOR_JSON_FILE"
          emit_json_output "validate_result_json" "$VALIDATE_JSON_FILE"
          emit_json_output "build_result_json" "$BUILD_JSON_FILE"

      - name: Upload build logs
        if: ${{ always() && inputs.upload-log-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: |
            ${{ runner.temp }}/slideflow-build.log
            ${{ runner.temp }}/slideflow-presentation-urls.txt
            ${{ runner.temp }}/slideflow-doctor-result.json
            ${{ runner.temp }}/slideflow-validate-result.json
            ${{ runner.temp }}/slideflow-build-result.json
          if-no-files-found: ignore
