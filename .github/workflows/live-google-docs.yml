name: Live Google Docs

on:
  workflow_dispatch:

jobs:
  live-google-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ai]"

      - name: Validate required secrets
        env:
          GOOGLE_DOCS_CREDENTIALS: ${{ secrets.GOOGLE_DOCS_CREDENTIALS || secrets.GOOGLE_SLIDEFLOW_CREDENTIALS }}
          SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID: ${{ secrets.SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID || secrets.SLIDEFLOW_LIVE_PRESENTATION_FOLDER_ID }}
        run: |
          set -euo pipefail
          [[ -n "${GOOGLE_DOCS_CREDENTIALS:-}" ]] || {
            echo "Missing required secret: GOOGLE_DOCS_CREDENTIALS (or GOOGLE_SLIDEFLOW_CREDENTIALS fallback)"
            exit 1
          }
          [[ -n "${SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID:-}" ]] || {
            echo "Missing required secret: SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID (or SLIDEFLOW_LIVE_PRESENTATION_FOLDER_ID fallback)"
            exit 1
          }

      - name: Run live Google Docs tests
        env:
          SLIDEFLOW_RUN_LIVE: "1"
          GOOGLE_DOCS_CREDENTIALS: ${{ secrets.GOOGLE_DOCS_CREDENTIALS || secrets.GOOGLE_SLIDEFLOW_CREDENTIALS }}
          GOOGLE_SLIDEFLOW_CREDENTIALS: ${{ secrets.GOOGLE_SLIDEFLOW_CREDENTIALS || secrets.GOOGLE_DOCS_CREDENTIALS }}
          SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID: ${{ secrets.SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID || secrets.SLIDEFLOW_LIVE_PRESENTATION_FOLDER_ID }}
          SLIDEFLOW_LIVE_DRIVE_FOLDER_ID: ${{ secrets.SLIDEFLOW_LIVE_DRIVE_FOLDER_ID || secrets.SLIDEFLOW_LIVE_DOCUMENT_FOLDER_ID || secrets.SLIDEFLOW_LIVE_PRESENTATION_FOLDER_ID }}
          SLIDEFLOW_LIVE_DOC_TEMPLATE_ID: ${{ secrets.SLIDEFLOW_LIVE_DOC_TEMPLATE_ID }}
          SLIDEFLOW_LIVE_SHARE_EMAIL: ${{ secrets.SLIDEFLOW_LIVE_SHARE_EMAIL }}
          SLIDEFLOW_LIVE_SHARE_ROLE: "reader"
          SLIDEFLOW_LIVE_KEEP_ARTIFACTS: "0"
          SLIDEFLOW_LIVE_RPS: "1.0"
        run: |
          python -m pytest -q tests/live_tests -m live_google_docs -s
