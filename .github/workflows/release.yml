name: Release

on:
  push:
    branches:
      - "release/v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate release branch
        id: branch
        run: |
          VERSION=$(python scripts/ci/validate_release_branch.py "${GITHUB_REF_NAME}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install project and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ai]" build

      - name: Validate version consistency
        run: |
          python scripts/ci/check_version_consistency.py "${GITHUB_REF_NAME}"

      - name: Run release test suite
        run: |
          python -m pytest -q \
            --cov=slideflow \
            --cov-report=term \
            --cov-fail-under=75

      - name: Build distribution artifacts
        run: |
          python -m build

      - name: Create and push release tag
        env:
          VERSION: ${{ steps.branch.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Aborting release."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.branch.outputs.version }}
          name: v${{ steps.branch.outputs.version }}
          generate_release_notes: true
          files: dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
