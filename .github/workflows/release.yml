name: Release

on:
  push:
    branches:
      - "release/v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Validate release branch
        id: branch
        run: |
          VERSION=$(python scripts/ci/validate_release_branch.py "${GITHUB_REF_NAME}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install project and release dependencies (locked)
        run: |
          uv lock --check
          uv sync --extra dev --extra ai --locked

      - name: Validate dependency resolution
        run: |
          uv pip check

      - name: Check NumPy/Pandas binary compatibility
        run: |
          uv run python scripts/ci/check_numpy_binary_compatibility.py

      - name: Validate version consistency
        run: |
          uv run python scripts/ci/check_version_consistency.py "${GITHUB_REF_NAME}"

      - name: Check code formatting
        run: |
          uv run python -m black --check slideflow tests scripts

      - name: Run lint checks
        run: |
          uv run python -m ruff check slideflow tests scripts

      - name: Run type checks
        run: |
          uv run python -m mypy slideflow

      - name: Run release test suite
        run: |
          uv run python -m pytest -q \
            --cov=slideflow \
            --cov-report=term \
            --cov-fail-under=80

      - name: Build distribution artifacts
        run: |
          uv pip install build
          uv run python -m build

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          bash scripts/ci/run_quickstart_smoke.sh

      - name: Verify distribution package identity
        run: |
          python - <<'PY'
          from pathlib import Path

          dist_files = [path.name for path in Path("dist").iterdir() if path.is_file()]
          if not dist_files:
            raise SystemExit("No built distribution files found in dist/.")

          if not all("slideflow_presentations" in file_name for file_name in dist_files):
            raise SystemExit(
              f"Expected all artifacts to contain 'slideflow_presentations', got: {dist_files}"
            )
          print("Distribution identity check passed:", dist_files)
          PY

      - name: Detect existing release artifacts
        id: release_state
        env:
          VERSION: ${{ steps.branch.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import urllib.error
          import urllib.request


          def url_exists(url: str, headers: dict[str, str] | None = None) -> bool:
              request = urllib.request.Request(url, headers=headers or {})
              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      return response.status == 200
              except urllib.error.HTTPError as error:
                  if error.code == 404:
                      return False
                  raise


          version = os.environ["VERSION"]
          repository = os.environ["REPOSITORY"]
          tag = f"v{version}"

          package_exists = url_exists(
              f"https://pypi.org/pypi/slideflow-presentations/{version}/json"
          )
          tag_exists = (
              subprocess.run(
                  ["git", "rev-parse", "--verify", "--quiet", f"refs/tags/{tag}"],
                  check=False,
                  capture_output=True,
                  text=True,
              ).returncode
              == 0
          )
          release_exists = url_exists(
              f"https://api.github.com/repos/{repository}/releases/tags/{tag}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              },
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(f"package_exists={str(package_exists).lower()}\n")
              output_file.write(f"tag_exists={str(tag_exists).lower()}\n")
              output_file.write(f"release_exists={str(release_exists).lower()}\n")
          PY

      - name: Release idempotency summary
        run: |
          echo "PyPI version exists: ${{ steps.release_state.outputs.package_exists }}"
          echo "Git tag exists: ${{ steps.release_state.outputs.tag_exists }}"
          echo "GitHub release exists: ${{ steps.release_state.outputs.release_exists }}"

      - name: Publish package to PyPI
        if: ${{ steps.release_state.outputs.package_exists != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push release tag
        if: ${{ steps.release_state.outputs.tag_exists != 'true' }}
        env:
          VERSION: ${{ steps.branch.outputs.version }}
        run: |
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: ${{ steps.release_state.outputs.release_exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.branch.outputs.version }}
          name: v${{ steps.branch.outputs.version }}
          generate_release_notes: true
          files: dist/*
