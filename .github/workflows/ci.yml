name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install project and test dependencies (locked)
        run: |
          uv lock --check
          uv sync --extra dev --extra ai --locked

      - name: Validate dependency resolution
        run: |
          uv pip check

      - name: Run pre-commit hooks
        if: matrix.python-version == '3.12'
        run: |
          uv run pre-commit run --all-files

      - name: Check NumPy/Pandas binary compatibility
        run: |
          uv run python scripts/ci/check_numpy_binary_compatibility.py

      - name: Version consistency checks
        run: |
          uv run python scripts/ci/check_version_consistency.py

      - name: Check code formatting
        run: |
          uv run python -m black --check slideflow tests scripts

      - name: Run lint checks
        run: |
          uv run python -m ruff check slideflow tests scripts

      - name: Run type checks
        run: |
          uv run python -m mypy slideflow

      - name: Run unit tests with coverage
        run: |
          uv run python -m pytest -q \
            -m "not integration and not e2e" \
            --cov=slideflow \
            --cov-branch \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=82

      - name: Run integration tests
        run: |
          uv run python -m pytest -q -m integration

      - name: Run e2e tests
        run: |
          uv run python -m pytest -q -m e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  optional-connectors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install optional connector dependencies (locked)
        run: |
          uv lock --check
          uv sync --extra dev --extra ai --extra databricks --extra dbt --extra bigquery --extra duckdb --locked

      - name: Validate dependency resolution
        run: |
          uv pip check

      - name: Verify optional connector extras importability
        run: |
          uv run python - <<'PY'
          import dbt.cli.main  # noqa: F401
          import databricks.sql  # noqa: F401
          import git  # noqa: F401
          import google.cloud.bigquery  # noqa: F401
          import duckdb  # noqa: F401
          print("Optional connector extras importability check passed.")
          PY

      - name: Run optional connector tests
        run: |
          uv run python -m pytest -q \
            tests/test_bigquery_connector.py \
            tests/test_duckdb_connector.py

  build-dist:
    runs-on: ubuntu-latest
    needs:
      - test
      - optional-connectors

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify lockfile is up to date
        run: |
          uv lock --check

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify distribution package identity
        run: |
          python - <<'PY'
          from pathlib import Path

          dist_files = [path.name for path in Path("dist").iterdir() if path.is_file()]
          if not dist_files:
            raise SystemExit("No built distribution files found in dist/.")

          if not all("slideflow_presentations" in file_name for file_name in dist_files):
            raise SystemExit(
              f"Expected all artifacts to contain 'slideflow_presentations', got: {dist_files}"
            )
          print("Distribution identity check passed:", dist_files)
          PY

      - name: Smoke test installed wheel (validate + dry-run build)
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          bash scripts/ci/run_quickstart_smoke.sh

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
