name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,ai]"

      - name: Validate dependency resolution
        run: |
          python -m pip check

      - name: Check NumPy/Pandas binary compatibility
        run: |
          python scripts/ci/check_numpy_binary_compatibility.py

      - name: Version consistency checks
        run: |
          python scripts/ci/check_version_consistency.py

      - name: Check code formatting
        run: |
          python -m black --check slideflow tests scripts

      - name: Run lint checks
        run: |
          python -m ruff check slideflow tests scripts

      - name: Run type checks
        run: |
          python -m mypy slideflow

      - name: Run unit tests with coverage
        run: |
          python -m pytest -q \
            -m "not integration and not e2e" \
            --cov=slideflow \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Run integration tests
        run: |
          python -m pytest -q -m integration

      - name: Run e2e tests
        run: |
          python -m pytest -q -m e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build-dist:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify distribution package identity
        run: |
          python - <<'PY'
          from pathlib import Path

          dist_files = [path.name for path in Path("dist").iterdir() if path.is_file()]
          if not dist_files:
            raise SystemExit("No built distribution files found in dist/.")

          if not all("slideflow_presentations" in file_name for file_name in dist_files):
            raise SystemExit(
              f"Expected all artifacts to contain 'slideflow_presentations', got: {dist_files}"
            )
          print("Distribution identity check passed:", dist_files)
          PY

      - name: Smoke test installed wheel (validate + dry-run build)
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          bash scripts/ci/run_quickstart_smoke.sh

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
