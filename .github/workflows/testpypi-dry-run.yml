name: TestPyPI Dry Run

on:
  workflow_dispatch:
  push:
    branches:
      - "release/v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate version consistency
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            python scripts/ci/check_version_consistency.py "${GITHUB_REF_NAME}"
          else
            python scripts/ci/check_version_consistency.py
          fi

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Smoke test built wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          bash scripts/ci/run_quickstart_smoke.sh

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
