site_name: SlideFlow
site_description: Automated data-driven generation for Google Slides and Google Docs.
site_url: https://joe-broadhead.github.io/slideflow/
repo_url: https://github.com/joe-broadhead/slideflow
repo_name: slideflow
edit_uri: edit/master/docs/
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/joe-broadhead/slideflow
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quickstart: quickstart.md
      - Cookbooks: cookbooks.md
      - Troubleshooting: troubleshooting.md
  - How-To:
      - Google Sheets Provider: providers/google-sheets.md
      - Google Docs Provider: providers/google-docs.md
      - Google Slides Provider: providers/google-slides.md
      - Data Connectors: data-connectors.md
      - DBT Migration: dbt-migration.md
      - Data Transforms: data-transforms.md
      - AI Providers: ai-providers.md
      - Deployments: deployments.md
  - Reference:
      - CLI Reference: cli-reference.md
      - Configuration Reference: config-reference.md
      - Replacements: replacements.md
      - Charts: charts.md
      - Templating: templating.md
      - Template Catalog: template-catalog.md
      - Template Authoring: template-authoring.md
  - Operations:
      - Automation: automation.md
      - Testing: testing.md
      - Security: security.md
      - Release: release-process.md
      - Changelog: changelog.md
  - Development:
      - Contributing: contributing.md
      - Compatibility Policy: compatibility-policy.md
      - CI & Quality: ci-quality.md
      - Agent Skills: agent-skills.md
